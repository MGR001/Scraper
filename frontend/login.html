<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — RIvals</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --paper:    #F6F8FA;
  --surface:  #FFFFFF;
  --ink:      #0D1B2A;
  --ink-soft: #3C4C5C;
  --muted:    #6B7C8C;
  --line:     #E3E8ED;
  --navy:     #12314F;
  --you:      #0E7C7B;
  --you-wash: #E6F3F2;
  --them:     #B4241C;
  --sans:'Instrument Sans', system-ui, -apple-system, sans-serif;
  --mono:'IBM Plex Mono', ui-monospace, monospace;
  --r-sm:6px; --r:10px; --r-lg:16px;
  --shadow:   0 4px 12px rgba(13,27,42,.06), 0 1px 3px rgba(13,27,42,.04);
  --shadow-lg:0 18px 44px rgba(13,27,42,.10), 0 2px 8px rgba(13,27,42,.05);
  --gutter: clamp(1.25rem, 5vw, 4.5rem);
  --max: 1180px;
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0 }
body{
  background:var(--paper); color:var(--ink);
  font-family:var(--sans); font-size:16px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh; display:flex; flex-direction:column;
}
a{ color:inherit; text-decoration:none }
:focus-visible{ outline:2px solid var(--you); outline-offset:2px; border-radius:3px }

/* NAV */
.nav{
  background:rgba(246,248,250,.88); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.nav-in{
  max-width:var(--max); margin:0 auto; padding:.85rem var(--gutter);
  display:flex; align-items:center; justify-content:space-between;
}
.mark{ display:flex; align-items:center; gap:.55rem; font-weight:700; font-size:1.12rem; letter-spacing:-.02em }
.glyph{ width:22px; height:22px; border-radius:5px; background:var(--navy); position:relative; flex:0 0 auto }
.glyph::after{
  content:""; position:absolute; left:50%; top:4px; bottom:4px;
  width:1.5px; margin-left:-.75px; background:#fff; opacity:.85;
}
.nav-back{ font-size:.9rem; color:var(--muted); display:flex; align-items:center; gap:.4rem }
.nav-back:hover{ color:var(--ink) }

/* MAIN */
main{
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:clamp(2rem, 5vw, 4rem) var(--gutter);
}

/* CARD */
.card{
  background:var(--surface); border:1px solid var(--line);
  border-radius:var(--r-lg); box-shadow:var(--shadow-lg);
  width:100%; max-width:420px; overflow:hidden;
  animation:rise .5s cubic-bezier(.2,.7,.3,1) both;
}
@keyframes rise{ from{ opacity:0; transform:translateY(14px) } to{ opacity:1; transform:none } }

.card-top{
  padding:2rem 2rem 1.5rem;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--you-wash),#fff 75%);
}
.card-brand{
  font-family:var(--mono); font-size:.65rem; letter-spacing:.15em;
  text-transform:uppercase; color:var(--you); margin-bottom:.75rem;
}
.card-title{ font-size:1.4rem; font-weight:700; letter-spacing:-.025em; line-height:1.15 }
.card-sub{ font-size:.9rem; color:var(--muted); margin-top:.4rem }

.card-body{ padding:1.75rem 2rem 2rem }

/* FORM */
label{
  display:block; font-size:.82rem; font-weight:600; color:var(--ink-soft);
  margin-bottom:.4rem; letter-spacing:.01em;
}
.input-wrap{ position:relative }
input[type="password"], input[type="text"]{
  width:100%; padding:.72rem 2.8rem .72rem .9rem;
  font-family:var(--sans); font-size:.95rem; color:var(--ink);
  background:var(--paper); border:1px solid var(--line);
  border-radius:var(--r-sm); outline:none;
  transition:border-color .15s, box-shadow .15s;
}
input[type="password"]:focus, input[type="text"]:focus{
  border-color:var(--you); box-shadow:0 0 0 3px var(--you-wash);
}
.toggle-vis{
  position:absolute; right:.7rem; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--muted);
  padding:.2rem; line-height:0; transition:color .15s;
}
.toggle-vis:hover{ color:var(--ink) }

.hint{ font-size:.8rem; color:var(--muted); margin-top:.55rem; line-height:1.5 }
.hint a{ color:var(--you); text-decoration:underline; text-underline-offset:2px }

.btn-submit{
  width:100%; margin-top:1.25rem;
  display:flex; align-items:center; justify-content:center; gap:.5rem;
  font-family:var(--sans); font-size:.95rem; font-weight:600;
  padding:.78rem 1.25rem; border-radius:var(--r-sm);
  border:none; cursor:pointer; background:var(--navy); color:#fff;
  box-shadow:0 1px 2px rgba(13,27,42,.08);
  transition:background .16s, box-shadow .16s, transform .1s;
}
.btn-submit:hover{ background:#1B4370; box-shadow:0 4px 12px rgba(13,27,42,.12) }
.btn-submit:active{ transform:translateY(1px) }
.btn-submit:disabled{ opacity:.55; cursor:not-allowed; transform:none }

/* ERROR / SUCCESS */
.msg{
  display:none; margin-top:1rem; padding:.7rem .9rem;
  border-radius:var(--r-sm); font-size:.875rem; font-weight:500;
}
.msg.error{ display:block; background:#FEF2F2; color:var(--them); border:1px solid #FECACA }
.msg.ok   { display:block; background:var(--you-wash); color:var(--you); border:1px solid #A7D8D7 }

/* FOOTER */
footer{
  text-align:center; padding:1.5rem var(--gutter);
  font-size:.82rem; color:var(--muted);
}
footer a:hover{ color:var(--ink) }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-in">
    <a href="/" class="mark"><span class="glyph"></span> RIvals</a>
    <a href="/" class="nav-back">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Back
    </a>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-top">
      <div class="card-brand">RIvals · Competitive Intelligence</div>
      <div class="card-title">Sign in to your workspace</div>
      <div class="card-sub">Enter your API key to continue</div>
    </div>
    <div class="card-body">
      <form id="login-form" onsubmit="handleLogin(event)" autocomplete="off">
        <label for="api-key">API Key</label>
        <div class="input-wrap">
          <input type="password" id="api-key" name="api-key"
            placeholder="sk-••••••••••••••••••••"
            autocomplete="current-password" spellcheck="false" required />
          <button type="button" class="toggle-vis" aria-label="Show/hide key" onclick="toggleVis()">
            <svg id="eye-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
        <p class="hint">
          Set <code>API_AUTH_KEY</code> in your <code>.env</code> file.
          Leave the field blank if auth is disabled.
        </p>

        <div id="msg" class="msg"></div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
          Sign in
        </button>
      </form>
    </div>
  </div>
</main>

<footer>
  <a href="/">← Back to homepage</a>
</footer>

<script>
function toggleVis() {
  const inp = document.getElementById('api-key');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function handleLogin(e) {
  e.preventDefault();
  const key   = document.getElementById('api-key').value.trim();
  const btn   = document.getElementById('submit-btn');
  const msg   = document.getElementById('msg');

  msg.className = 'msg';
  msg.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Checking…';

  try {
    const res = await fetch('/api/sources/', {
      headers: { 'X-API-Key': key, 'Content-Type': 'application/json' }
    });

    if (res.status === 401) {
      msg.className = 'msg error';
      msg.textContent = 'Invalid API key — check your .env file and try again.';
      btn.disabled = false;
      btn.innerHTML = '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg> Sign in';
      return;
    }

    // Key works (or auth is disabled)
    sessionStorage.setItem('sh_api_key', key);
    msg.className = 'msg ok';
    msg.textContent = 'Verified — opening your workspace…';
    setTimeout(() => { window.location.href = '/app'; }, 600);

  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = 'Could not reach the server. Is it running?';
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg> Sign in';
  }
}
</script>
</body>
</html>
